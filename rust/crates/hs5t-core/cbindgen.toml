language = "C"
usize_is_size_t = true

include_guard = "__HEV_MAIN_RUST_H__"
pragma_once = false
autogen_warning = "/* This file is auto-generated by cbindgen. DO NOT EDIT. */"
tab_width = 4
documentation = true
documentation_style = "c"

header = """/*
 ============================================================================
 Name        : hev-main-rust.h
 Auto-generated by cbindgen from hs5t-core (feature = "c-api")
 ============================================================================
 */"""

[parse]
parse_deps = false
include = ["hs5t-core"]

[export]
include = [
    "hev_socks5_tunnel_main",
    "hev_socks5_tunnel_main_from_file",
    "hev_socks5_tunnel_main_from_str",
    "hev_socks5_tunnel_quit",
    "hev_socks5_tunnel_stats",
]
